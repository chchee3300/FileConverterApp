name: Release

on:
  push:
    branches: [master]
  workflow_dispatch: {}

# get-next-version's dry-run push check and the real release job both need
# write access to create tags/releases.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  get-next-version:
    runs-on: ubuntu-latest
    outputs:
      will-release: ${{ steps.version.outputs.will-release }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # semantic-release >=25 requires Node >=22.14 -- unrelated to the
      # Node version the app itself builds with (see build-* jobs below).
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - id: version
        run: node scripts/get-next-version.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: get-next-version
    if: needs.get-next-version.outputs.will-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm install -g @neutralinojs/neu
      - run: neu update
      # neu update (per neutralino.config.json's cli.clientLibrary) writes
      # the client lib straight to web-dist/js/neutralino.js -- but vite's
      # build wipes web-dist/ (emptyOutDir) before copying it back in from
      # resources/js/neutralino.js (vite.config.mjs's declared "single
      # source of truth", gitignored, otherwise never populated on a fresh
      # checkout). Persist neu update's output there first.
      - run: node -e "require('fs').copyFileSync('web-dist/js/neutralino.js', 'resources/js/neutralino.js')"
      - run: node scripts/write-version.mjs "${{ needs.get-next-version.outputs.version }}"
      - run: npm run build
      - name: Install unzip and fpm
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip ruby ruby-dev build-essential rpm
          sudo gem install --no-document fpm
      - run: node setup.mjs
      - run: neu build --release --embed-resources
      - run: bash packaging/linux/build.sh "${{ needs.get-next-version.outputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: release-assets/*
          retention-days: 1

  build-windows:
    needs: get-next-version
    if: needs.get-next-version.outputs.will-release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm install -g @neutralinojs/neu
      - run: neu update
      # neu update (per neutralino.config.json's cli.clientLibrary) writes
      # the client lib straight to web-dist/js/neutralino.js -- but vite's
      # build wipes web-dist/ (emptyOutDir) before copying it back in from
      # resources/js/neutralino.js (vite.config.mjs's declared "single
      # source of truth", gitignored, otherwise never populated on a fresh
      # checkout). Persist neu update's output there first.
      - run: node -e "require('fs').copyFileSync('web-dist/js/neutralino.js', 'resources/js/neutralino.js')"
      - run: node scripts/write-version.mjs "${{ needs.get-next-version.outputs.version }}"
      - run: npm run build
      - run: node setup.mjs
      - run: neu build --release --embed-resources
      - run: pwsh packaging/windows/install-innosetup.ps1
      - run: pwsh packaging/windows/build.ps1 -Version "${{ needs.get-next-version.outputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: release-assets/*
          retention-days: 1

  build-macos:
    needs: get-next-version
    if: needs.get-next-version.outputs.will-release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm install -g @neutralinojs/neu
      - run: neu update
      # neu update (per neutralino.config.json's cli.clientLibrary) writes
      # the client lib straight to web-dist/js/neutralino.js -- but vite's
      # build wipes web-dist/ (emptyOutDir) before copying it back in from
      # resources/js/neutralino.js (vite.config.mjs's declared "single
      # source of truth", gitignored, otherwise never populated on a fresh
      # checkout). Persist neu update's output there first.
      - run: node -e "require('fs').copyFileSync('web-dist/js/neutralino.js', 'resources/js/neutralino.js')"
      - run: node scripts/write-version.mjs "${{ needs.get-next-version.outputs.version }}"
      - run: npm run build
      - run: node setup.mjs
      - name: Populate the other mac arch folder
        # evermeet.cx publishes one ffmpeg build advertised as covering both
        # Intel and Apple Silicon (see setup.mjs) -- setup.mjs only downloads
        # it into the runner's own arch folder, so copy it into the other
        # arch's folder too rather than downloading it twice.
        run: |
          if [ -f binaries/mac_arm64/ffmpeg ] && [ ! -f binaries/mac_x64/ffmpeg ]; then
            mkdir -p binaries/mac_x64 && cp binaries/mac_arm64/ffmpeg binaries/mac_x64/ffmpeg
          elif [ -f binaries/mac_x64/ffmpeg ] && [ ! -f binaries/mac_arm64/ffmpeg ]; then
            mkdir -p binaries/mac_arm64 && cp binaries/mac_x64/ffmpeg binaries/mac_arm64/ffmpeg
          fi
      - run: neu build --release --embed-resources
      - run: bash packaging/macos/build.sh "${{ needs.get-next-version.outputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: release-assets/*
          retention-days: 1

  release:
    needs: [get-next-version, build-linux, build-windows, build-macos]
    if: needs.get-next-version.outputs.will-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Download all built packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: '*-packages'
          merge-multiple: true
      - run: ls -la release-assets
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
