<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SORAI Toolkit</title>
    <!-- Prevent flash of wrong theme, ported unchanged from resources/index.html:11-17 -->
    <script>
      (function () {
        var t = localStorage.getItem('estella-theme') || 'dark'
        document.documentElement.setAttribute('data-theme', t)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Must be a real <script src>, not bundled — neu's dev server injects
         window.NL_PORT/NL_TOKEN/etc. into its response for this exact path
         (neutralino.config.json's "clientLibrary"), triggered by the
         browser's own HTTP request. Bundling neutralino.js at build time
         (as loadNeutralino.js originally tried via a `?raw` import) skips
         that request entirely, so the globals never get set — found via
         the Phase 2.2+2.3+2.4 real-Neutralino probe test, see
         design-system/MASTER.md decisions log. -->
    <script src="/js/neutralino.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
